name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Debug environment
        run: |
          echo "=== Environment ==="
          node -v
          npm -v
          echo "=== Repo Listing ==="
          pwd
          ls -la

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy CNAME if present
        run: |
          if [ -f "./CNAME" ]; then
            echo "Copying CNAME to docs/"
            mkdir -p docs
            cp ./CNAME ./docs/CNAME
          else
            echo "No CNAME in repo root"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
